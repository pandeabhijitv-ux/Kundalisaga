plugins {
    id 'com.android.application'
    id 'com.chaquo.python'
}

import java.util.Properties
import java.io.FileInputStream

/**
 * Set this to true to create four separate APKs instead of one,
 * one for each native architecture. This is useful if you don't
 * use App Bundles (https://developer.android.com/guide/app-bundle/)
 * and want to have separate APKs to upload to the Play Store.
 */
def enableSeparateBuildPerCPUArchitecture = false

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

def isEasBuild = System.getenv("EAS_BUILD") == "true"
def pythonExecutable = System.getenv("PYTHON_EXECUTABLE")

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.kundalii.saga"
    compileSdk 35
    ndkVersion "25.1.8937393"

    defaultConfig {
        applicationId "com.kundalii.saga"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 13
        versionName "1.0.13"
        
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", "false"
        buildConfigField "boolean", "IS_HERMES_ENABLED", "true"
        
        // Enable multidex for large APKs
        multiDexEnabled true
        
        // Filter out invalid language codes from React Native/Facebook libraries
        resConfigs "en", "hi", "bn", "te", "mr", "ta", "gu", "kn", "ml", "pa", "or", "as"
        
        // Chaquopy Python configuration
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
        
        python {
            // Python version - use 3.8 for best Chaquopy compatibility
            version "3.8"
            
            // Install only pure Python packages (no native code)
            pip {
                install "pytz==2023.3"  // Timezone support
                install "pyyaml==6.0.1" // YAML config loader support
            }

            // Use environment-provided Python executable for CI/local portability
            if (pythonExecutable != null && !pythonExecutable.trim().isEmpty()) {
                buildPython pythonExecutable
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (isEasBuild && project.hasProperty("android.injected.signing.store.file")) {
                storeFile file(project.property("android.injected.signing.store.file"))
                storePassword project.property("android.injected.signing.store.password")
                keyAlias project.property("android.injected.signing.key.alias")
                keyPassword project.property("android.injected.signing.key.password")
            } else if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            if (isEasBuild || keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures {
        buildConfig true
    }

    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk false
            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    sourceSets {
        main {
            // Chaquopy Python source modules for native bridge imports.
            python.srcDirs = ['../../python_modules']
            // Include Python modules as assets
            assets.srcDirs += ['../../python_modules']
            // Include vector icon fonts
            assets.srcDirs += ['../../node_modules/react-native-vector-icons/Fonts']
            // Main Java/Kotlin source
            java.srcDirs += ['src/main/java']
        }
    }
}

dependencies {
    // React Native from Maven
    def react_native_version = "0.73.0"
    implementation "com.facebook.react:react-android:$react_native_version"
    implementation "com.facebook.react:hermes-android:$react_native_version"
    
    // Multidex support for large apps
    implementation 'androidx.multidex:multidex:2.0.1'
    
    // React Native dependencies
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    
    // Gesture Handler
    implementation project(':react-native-gesture-handler')

    // Async Storage
    implementation project(':react-native-async-storage_async-storage')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-screens')
}

// React Native Bundle Task - Generate JavaScript bundle for release builds
project.ext.react = [
    bundleAssetName: "index.android.bundle",
    entryFile: "index.js",
    root: "../../"
]

def reactRoot = file("../../")
def inputExcludes = ["android/**", "ios/**"]
def bundleAssetName = "index.android.bundle"
def jsBundleDir = file("$projectDir/src/main/assets")
def jsResDir = file("$projectDir/src/main/res")

task bundleReleaseJsAndAssets(type: Exec) {
    description = "Generate JavaScript bundle for release"
    
    // Create the output directory
    doFirst {
        jsBundleDir.mkdirs()
        jsResDir.mkdirs()
        file("$jsBundleDir/$bundleAssetName").delete()
    }
    
    // On Windows, we need to use cmd.exe
    if (System.properties['os.name'].toLowerCase().contains('windows')) {
        commandLine "cmd", "/c", "npx", "react-native", "bundle",
            "--platform", "android",
            "--dev", "false",
            "--entry-file", "index.js",
            "--bundle-output", "$jsBundleDir/$bundleAssetName",
            "--assets-dest", "$jsResDir"
    } else {
        commandLine "npx", "react-native", "bundle",
            "--platform", "android",
            "--dev", "false",
            "--entry-file", "index.js",
            "--bundle-output", "$jsBundleDir/$bundleAssetName",
            "--assets-dest", "$jsResDir"
    }
    
    workingDir reactRoot
}

// Make bundle task run before merge assets
afterEvaluate {
    android.applicationVariants.all { variant ->
        def targetName = variant.name.capitalize()
        def generateAssetsTask = tasks.findByName("merge${targetName}Assets")
        if (generateAssetsTask) {
            generateAssetsTask.dependsOn(bundleReleaseJsAndAssets)
        }
    }
}

// The generated bundle directory is already consumed by the merge-assets pipeline.
// Adding it again as a source set causes duplicate index.android.bundle entries in bundleRelease.
